<!-- Modal Overlay -->
<div class="modal-overlay" (click)="close()"></div>

<!-- Modal Container -->
<div class="modal-container">
  <div class="modal-content">
    
    <!-- Close Button -->
    <button class="close-btn" (click)="close()" aria-label="Cerrar modal">
      ✕
    </button>

    <!-- Header -->
    <div class="modal-header">
      <h2>Iniciar Sesión</h2>
      <p>Accede a tu cuenta</p>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" class="error-message">
      <span class="error-icon"></span>
      {{ errorMessage }}
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="modal-form">
      
      <!-- Email Field -->
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="tu@email.com"
          [class.error]="form.get('email')?.invalid && form.get('email')?.touched"
          autocomplete="email"
        />
        <span class="error-text" *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
          Ingresa un email válido
        </span>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            id="password"
            formControlName="password"
            placeholder="Tu contraseña"
            [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Ocultar contraseña' : 'Mostrar contraseña'"
          >
            {{ showPassword ? '' : '' }}
          </button>
        </div>

        <span class="error-text" *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          La contraseña es requerida
        </span>
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="form.invalid || loading"
      >
        <span *ngIf="!loading">Iniciar Sesión</span>
        <span *ngIf="loading" class="loading-spinner">
           Iniciando...
        </span>
      </button>

    </form>

    <!-- Footer -->
    <div class="modal-footer">
      <p>¿No tienes cuenta? <a href="#" (click)="close(); $event.preventDefault()" class="link">Regístrate</a></p>
    </div>

  </div>
</div>
