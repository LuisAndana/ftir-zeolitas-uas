<div class="dashboard-container">
  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-content">
      <div class="navbar-left">
        <button class="menu-toggle" (click)="toggleMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/>
            <line x1="3" y1="12" x2="21" y2="12"/>
            <line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <h1 class="navbar-title">FTIR Zeolitas</h1>
      </div>
      
      <div class="navbar-right">
        <span class="user-name">{{ currentUser?.name }}</span>
        <button class="logout-btn" (click)="logout()">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Salir
        </button>
      </div>
    </div>
  </nav>

  <div class="dashboard-content">
    <!-- SIDEBAR -->
    <aside class="sidebar" [class.open]="menuOpen">
      <div class="sidebar-header">
        <h2>Menú</h2>
        <button class="close-btn" (click)="toggleMenu()">✕</button>
      </div>
      
      <ul class="menu">
        <li><a routerLink="/dashboard/cargar" (click)="menuOpen = false">📤 Cargar Espectro</a></li>
        <li><a routerLink="/dashboard/busqueda" (click)="menuOpen = false">🔍 Búsqueda</a></li>
        <li><a routerLink="/dashboard/biblioteca" (click)="menuOpen = false">📚 Biblioteca</a></li>
        <li><a routerLink="/dashboard/perfil" (click)="menuOpen = false">👤 Mi Perfil</a></li>
        <li><a routerLink="/dashboard/preferencias" (click)="menuOpen = false">⚙️ Preferencias</a></li>
      </ul>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<!-- Overlay para cerrar sidebar en móvil -->
<div class="sidebar-overlay" *ngIf="menuOpen" (click)="toggleMenu()"></div>
